    const abbr = {
      "i": "qui", "oi": "quoi", "ou": "ou", "an": "quand", "ent": "comment", "ien": "combien", "as": "as", "qui": "qui", "quoi": "quoi", "où": "ou", "ou": "ou", "quand": "quand", "comment": "comment", "combien": "combien"
    };

    document.getElementById('searchInput').addEventListener('input', () => {
      const val = document.getElementById('searchInput').value.trim().toLowerCase();
      let resultat = [];

      const abrev = val.split(/\s+/)[0];
      const reste = val.split(/\s+/).slice(1).join(" ");

      if (abbr[abrev] && /^\d+$/.test(reste)) {
        const num = parseInt(reste, 10);
        resultat = fiches.filter(f => f.categorie === abbr[abrev] && f.numero === num);
      } else if (/^\d+$/.test(val)) {
        const num = parseInt(val, 10);
        resultat = fiches.filter(f => f.numero === num);
      }

      afficherFiches(resultat);
    });

    function afficherFiches(data) {
      const conteneur = document.getElementById('resultats');
      conteneur.innerHTML = '';
      data.forEach(fiche => {
        const div = document.createElement('div');
        div.className = 'fiche';
        div.innerHTML = `
          <div class="numero">Carte no ${fiche.numero} – Catégorie : <strong>${fiche.categorie.toUpperCase()}</strong></div>
          <div class="question"><strong>Q :</strong> ${formaterTexte(fiche.question)}</div>
          <div class="reponse"><strong>R :</strong> ${formaterTexte(fiche.reponse)}</div>
        `;
        conteneur.appendChild(div);
      });
    }

    function formaterTexte(t) {
      return t
        .replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^\*]+)\*/g, '<em>$1</em>')
        .replace(/<sup>(.*?)<\/sup>/g, '<sup>$1</sup>');
    }

    // Afficher les 10 premières fiches dès le chargement
    window.addEventListener('DOMContentLoaded', () => {
      afficherFiches(fiches.slice(0, 10));
    });
    window.addEventListener('DOMContentLoaded', () => {
      afficherFiches(fiches.slice(0, 10));
    });
